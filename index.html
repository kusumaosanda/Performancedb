<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1e3a5f;
      --accent: #2d7dd2;
      --accent2: #3ec6a6;
      --danger: #e74c3c;
      --warning: #f39c12;
      --success: #27ae60;
      --bg: #f0f2f6;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --sidebar-w: 220px;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ─────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--primary);
      color: #fff;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 100;
      transition: transform .3s;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .sidebar-logo h2 { font-size: 1.1rem; font-weight: 700; letter-spacing: .5px; }
    .sidebar-logo p  { font-size: .72rem; color: rgba(255,255,255,.55); margin-top: 2px; }

    nav { flex: 1; padding: 16px 0; }
    nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 20px;
      color: rgba(255,255,255,.7);
      text-decoration: none;
      font-size: .88rem;
      border-left: 3px solid transparent;
      transition: all .2s;
      cursor: pointer;
    }
    nav a:hover, nav a.active {
      color: #fff;
      background: rgba(255,255,255,.08);
      border-left-color: var(--accent2);
    }
    nav a .icon { font-size: 1.1rem; width: 20px; text-align: center; }

    .sidebar-footer {
      padding: 16px 20px;
      font-size: .72rem;
      color: rgba(255,255,255,.35);
      border-top: 1px solid rgba(255,255,255,.1);
    }

    /* ── MAIN ────────────────────────────────────── */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0;
      z-index: 50;
    }
    header h1 { font-size: 1rem; font-weight: 600; color: var(--text); }
    .header-meta { font-size: .8rem; color: var(--muted); }
    .header-badge {
      background: var(--accent2);
      color: #fff;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 600;
    }

    .hamburger {
      display: none;
      background: none; border: none;
      font-size: 1.4rem; cursor: pointer;
      color: var(--text);
    }

    /* ── CONTENT ─────────────────────────────────── */
    .content { padding: 28px; flex: 1; }

    .page { display: none; }
    .page.active { display: block; }

    /* ── CARDS ───────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      padding: 22px 24px;
    }
    .card-title {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── GRID ────────────────────────────────────── */
    .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; }

    /* ── HOME ID ─────────────────────────────────── */
    .home-id-header {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 20px;
    }
    .home-id-avatar {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: #fff; flex-shrink: 0;
    }
    .home-id-title h2 { font-size: 1.3rem; font-weight: 700; }
    .home-id-title p  { font-size: .85rem; color: var(--muted); margin-top: 4px; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
      gap: 14px;
    }
    .info-item label {
      display: block;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .info-item span {
      font-size: .9rem;
      font-weight: 500;
    }

    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 600;
    }
    .status-badge.active   { background: #d1fae5; color: #065f46; }
    .status-badge.on-hold  { background: #fef3c7; color: #92400e; }
    .status-badge.complete { background: #dbeafe; color: #1e40af; }
    .status-badge.inactive { background: #f3f4f6; color: #6b7280; }
    .status-badge::before { content: '●'; }

    .tag {
      display: inline-block;
      background: #eff6ff;
      color: var(--accent);
      border: 1px solid #bfdbfe;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: .75rem;
      font-weight: 500;
      margin: 2px;
    }

    /* ── KPI CARDS ───────────────────────────────── */
    .kpi-card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      border-top: 4px solid var(--accent);
      position: relative;
      overflow: hidden;
    }
    .kpi-card .icon-bg {
      position: absolute;
      right: 16px; top: 16px;
      font-size: 2rem;
      opacity: .1;
    }
    .kpi-label {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
    }
    .kpi-value {
      font-size: 2rem;
      font-weight: 800;
      margin: 6px 0 4px;
      color: var(--text);
    }
    .kpi-meta { font-size: .78rem; color: var(--muted); }
    .kpi-progress { margin-top: 12px; }
    .kpi-progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .kpi-progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .6s ease;
    }
    .kpi-progress-label {
      display: flex; justify-content: space-between;
      font-size: .72rem; color: var(--muted); margin-top: 5px;
    }
    .delta {
      font-size: .78rem; font-weight: 600;
      padding: 2px 7px; border-radius: 99px;
      margin-left: 6px;
    }
    .delta.up   { background: #d1fae5; color: #065f46; }
    .delta.down { background: #fee2e2; color: #991b1b; }
    .delta.flat { background: #f3f4f6; color: #6b7280; }

    .chart-wrap { position: relative; height: 200px; margin-top: 8px; }

    /* ── PROJECT TRACKER ─────────────────────────── */
    .pt-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
    }
    .pt-toolbar h2 { font-size: 1.05rem; font-weight: 700; }
    .pt-filter-group { display: flex; gap: 8px; flex-wrap: wrap; }

    .filter-btn {
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: var(--card);
      font-size: .78rem;
      cursor: pointer;
      transition: all .2s;
      color: var(--muted);
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .search-input {
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .85rem;
      outline: none;
      width: 200px;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent); }

    .pt-table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: .73rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: #f8fafc; }
    tbody td { padding: 12px 14px; font-size: .88rem; }

    .pt-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .74rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .pt-status.not-started  { background: #f3f4f6; color: #6b7280; }
    .pt-status.in-progress  { background: #dbeafe; color: #1e40af; }
    .pt-status.completed    { background: #d1fae5; color: #065f46; }
    .pt-status.on-hold      { background: #fef3c7; color: #92400e; }
    .pt-status.cancelled    { background: #fee2e2; color: #991b1b; }
    .pt-status::before      { content: '●'; }

    .priority-dot {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .83rem; font-weight: 500;
    }
    .priority-dot::before { content: '●'; font-size: .65rem; }
    .priority-dot.high   { color: #e74c3c; }
    .priority-dot.medium { color: #f39c12; }
    .priority-dot.low    { color: #27ae60; }

    .mini-progress {
      width: 80px; height: 6px;
      background: var(--border);
      border-radius: 99px; overflow: hidden;
    }
    .mini-progress-fill {
      height: 100%; border-radius: 99px;
      background: var(--accent);
    }

    .pt-stats {
      display: flex; gap: 20px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .pt-stat {
      background: var(--card);
      border-radius: 10px;
      padding: 14px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      flex: 1; min-width: 100px;
      text-align: center;
    }
    .pt-stat .num { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
    .pt-stat .lbl { font-size: .72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

    .empty-state {
      text-align: center; padding: 40px; color: var(--muted);
      font-size: .88rem;
    }

    /* ── SECTION SPACER ──────────────────────────── */
    .section-gap { margin-top: 24px; }

    /* ── LOADING ─────────────────────────────────── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; color: var(--muted); font-size: .9rem; gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ──────────────────────────────── */
    @media (max-width: 768px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #main { margin-left: 0; }
      .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr 1fr; }
      .hamburger { display: block; }
      .content { padding: 16px; }
    }
    @media (max-width: 480px) {
      .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
    }

    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 90;
    }
    #overlay.show { display: block; }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-logo">
    <h2 id="sidebarTitle">My Dashboard</h2>
    <p id="sidebarSub">Management Portal</p>
  </div>
  <nav>
    <a class="active" onclick="showPage('home')" id="nav-home">
      <span class="icon">🏠</span> Home ID
    </a>
    <a onclick="showPage('kpi')" id="nav-kpi">
      <span class="icon">📊</span> KPI Menu
    </a>
    <a onclick="showPage('tracker')" id="nav-tracker">
      <span class="icon">📋</span> Project Tracker
    </a>
  </nav>
  <div class="sidebar-footer" id="lastUpdated">Loading…</div>
</div>
<div id="overlay" onclick="closeSidebar()"></div>

<!-- Main -->
<div id="main">
  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <h1 id="pageTitle">Home ID</h1>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="header-meta" id="headerDate"></span>
      <span class="header-badge" id="headerBadge">LIVE</span>
    </div>
  </header>

  <div class="content">

    <!-- ══ HOME ID PAGE ══ -->
    <div class="page active" id="page-home">
      <div class="card">
        <div class="loading" id="homeLoading">
          <div class="spinner"></div> Loading Home ID…
        </div>
        <div id="homeContent" style="display:none">
          <div class="home-id-header">
            <div class="home-id-avatar" id="homeAvatar">🏢</div>
            <div class="home-id-title">
              <h2 id="homeName">—</h2>
              <p id="homeSubtitle">—</p>
            </div>
          </div>
          <div class="info-grid" id="homeInfoGrid"></div>
          <div class="section-gap"></div>
          <div class="card-title">Tags</div>
          <div id="homeTags"></div>
          <div class="section-gap"></div>
          <div class="card-title">Description</div>
          <p id="homeDescription" style="font-size:.9rem;line-height:1.6;color:#374151;"></p>
        </div>
      </div>
    </div>

    <!-- ══ KPI PAGE ══ -->
    <div class="page" id="page-kpi">
      <div class="loading" id="kpiLoading">
        <div class="spinner"></div> Loading KPIs…
      </div>
      <div id="kpiContent" style="display:none">
        <div class="grid-4" id="kpiCards"></div>
        <div class="section-gap"></div>
        <div class="grid-2" id="kpiCharts"></div>
      </div>
    </div>

    <!-- ══ PROJECT TRACKER PAGE ══ -->
    <div class="page" id="page-tracker">
      <div class="loading" id="trackerLoading">
        <div class="spinner"></div> Loading projects…
      </div>
      <div id="trackerContent" style="display:none">
        <div class="pt-stats" id="ptStats"></div>
        <div class="card">
          <div class="pt-toolbar">
            <h2>Projects</h2>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
              <input class="search-input" type="text" placeholder="🔍 Search…" oninput="filterProjects(this.value)" />
              <div class="pt-filter-group" id="statusFilters"></div>
            </div>
          </div>
          <div class="pt-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Project</th>
                  <th>Status</th>
                  <th>Priority</th>
                  <th>PIC</th>
                  <th>Due Date</th>
                  <th>Progress</th>
                  <th>Category</th>
                </tr>
              </thead>
              <tbody id="projectTable"></tbody>
            </table>
            <div class="empty-state" id="noProjects" style="display:none">No projects match your filter.</div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
// To use OneDrive, replace each URL with your public OneDrive share download link.
// Example: https://onedrive.live.com/download?resid=XXX&authkey=XXX
const DATA_SOURCES = {
  home:     './data/home.json',
  kpis:     './data/kpis.json',
  projects: './data/projects.json',
};
// ─────────────────────────────────────────────────────────────────────────────

let allProjects = [];
let activeFilter = 'All';
let chartInstances = {};

// Helpers
const $ = id => document.getElementById(id);
const fmt = v => v !== undefined && v !== null ? v : '—';

function fetchJSON(url) {
  return fetch(url + '?t=' + Date.now()).then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
const pageTitles = { home: 'Home ID', kpi: 'KPI Menu', tracker: 'Project Tracker' };

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  $('page-' + id).classList.add('active');
  $('nav-' + id).classList.add('active');
  $('pageTitle').textContent = pageTitles[id];
  closeSidebar();
}

function toggleSidebar() {
  $('sidebar').classList.toggle('open');
  $('overlay').classList.toggle('show');
}
function closeSidebar() {
  $('sidebar').classList.remove('open');
  $('overlay').classList.remove('show');
}

// ─── DATE ────────────────────────────────────────────────────────────────────
function setDate() {
  const d = new Date();
  $('headerDate').textContent = d.toLocaleDateString('en-GB', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
  $('lastUpdated').textContent = 'Updated: ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
setDate();

// ─── HOME ID ──────────────────────────────────────────────────────────────────
function renderHome(data) {
  $('sidebarTitle').textContent = data.dashboardTitle || 'Dashboard';
  $('sidebarSub').textContent   = data.dashboardSub   || '';
  $('homeAvatar').textContent   = data.avatar || '🏢';
  $('homeName').textContent     = data.name || '—';
  $('homeSubtitle').textContent = data.subtitle || '';
  $('homeDescription').textContent = data.description || '';

  // Status badge for subtitle area
  if (data.status) {
    const cls = data.status.toLowerCase().replace(/\s+/g, '-');
    const badge = `<span class="status-badge ${cls}">${data.status}</span>`;
    $('homeSubtitle').innerHTML = (data.subtitle || '') + ' &nbsp; ' + badge;
  }

  // Info grid
  const grid = $('homeInfoGrid');
  grid.innerHTML = '';
  (data.fields || []).forEach(f => {
    grid.innerHTML += `<div class="info-item"><label>${f.label}</label><span>${fmt(f.value)}</span></div>`;
  });

  // Tags
  const tagsEl = $('homeTags');
  tagsEl.innerHTML = '';
  (data.tags || []).forEach(t => {
    tagsEl.innerHTML += `<span class="tag">${t}</span>`;
  });

  $('homeLoading').style.display = 'none';
  $('homeContent').style.display = 'block';
}

// ─── KPI ─────────────────────────────────────────────────────────────────────
const CARD_COLORS = ['#2d7dd2','#3ec6a6','#e74c3c','#f39c12','#8b5cf6','#1e3a5f'];

function renderKPIs(data) {
  const container = $('kpiCards');
  container.innerHTML = '';

  const accentColors = data.accentColors || CARD_COLORS;

  (data.kpis || []).forEach((kpi, i) => {
    const pct = kpi.target ? Math.min(100, Math.round((kpi.actual / kpi.target) * 100)) : null;
    const deltaClass = kpi.trend === 'up' ? 'up' : kpi.trend === 'down' ? 'down' : 'flat';
    const deltaArrow = kpi.trend === 'up' ? '▲' : kpi.trend === 'down' ? '▼' : '—';
    const color = accentColors[i % accentColors.length];

    container.innerHTML += `
      <div class="kpi-card" style="border-top-color:${color}">
        <div class="icon-bg">${kpi.icon || '📊'}</div>
        <div class="kpi-label">${kpi.label}</div>
        <div class="kpi-value">
          ${kpi.prefix || ''}${(kpi.actual ?? '—').toLocaleString()}${kpi.suffix || ''}
          ${kpi.trend ? `<span class="delta ${deltaClass}">${deltaArrow} ${kpi.delta || ''}</span>` : ''}
        </div>
        <div class="kpi-meta">Target: ${kpi.prefix || ''}${kpi.target !== undefined ? kpi.target.toLocaleString() : '—'}${kpi.suffix || ''}</div>
        ${pct !== null ? `
        <div class="kpi-progress">
          <div class="kpi-progress-bar">
            <div class="kpi-progress-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          <div class="kpi-progress-label"><span>${kpi.progressLabel || 'Achieved'}</span><span>${pct}%</span></div>
        </div>` : ''}
      </div>`;
  });

  // Charts
  const chartsContainer = $('kpiCharts');
  chartsContainer.innerHTML = '';

  (data.charts || []).forEach((ch, i) => {
    const id = 'chart_' + i;
    chartsContainer.innerHTML += `
      <div class="card">
        <div class="card-title">${ch.title}</div>
        <div class="chart-wrap"><canvas id="${id}"></canvas></div>
      </div>`;
  });

  // Render charts after DOM update
  setTimeout(() => {
    (data.charts || []).forEach((ch, i) => {
      const id = 'chart_' + i;
      const ctx = document.getElementById(id);
      if (!ctx) return;
      if (chartInstances[id]) chartInstances[id].destroy();

      chartInstances[id] = new Chart(ctx, {
        type: ch.type || 'bar',
        data: {
          labels: ch.labels,
          datasets: ch.datasets.map((ds, di) => ({
            label: ds.label,
            data: ds.data,
            backgroundColor: ds.color || CARD_COLORS[di % CARD_COLORS.length] + '99',
            borderColor: ds.color || CARD_COLORS[di % CARD_COLORS.length],
            borderWidth: 2,
            tension: 0.4,
            fill: ch.type === 'line' ? false : undefined,
            pointRadius: ch.type === 'line' ? 4 : undefined,
          }))
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'top', labels: { font: { size: 11 } } } },
          scales: ch.type === 'pie' || ch.type === 'doughnut' ? {} : {
            y: { beginAtZero: true, grid: { color: '#f0f2f6' } },
            x: { grid: { display: false } }
          }
        }
      });
    });
  }, 50);

  $('kpiLoading').style.display = 'none';
  $('kpiContent').style.display = 'block';
}

// ─── PROJECT TRACKER ─────────────────────────────────────────────────────────
function renderTracker(data) {
  allProjects = data.projects || [];

  // Stats
  const statuses = ['Not Started','In Progress','Completed','On Hold','Cancelled'];
  const statsEl = $('ptStats');
  statsEl.innerHTML = '';

  const counts = { Total: allProjects.length };
  statuses.forEach(s => { counts[s] = allProjects.filter(p => p.status === s).length; });

  ['Total','In Progress','Completed','On Hold'].forEach(k => {
    statsEl.innerHTML += `<div class="pt-stat"><div class="num">${counts[k] || 0}</div><div class="lbl">${k}</div></div>`;
  });

  // Filter buttons
  const filtersEl = $('statusFilters');
  filtersEl.innerHTML = '';
  ['All', ...statuses].forEach(s => {
    filtersEl.innerHTML += `<button class="filter-btn ${s==='All'?'active':''}" onclick="setFilter('${s}',this)">${s}</button>`;
  });

  renderTable(allProjects);

  $('trackerLoading').style.display = 'none';
  $('trackerContent').style.display = 'block';
}

function setFilter(status, btn) {
  activeFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const q = ($('.search-input') || {}).value || '';
  applyFilter(q);
}

function filterProjects(q) { applyFilter(q); }

function applyFilter(q) {
  let list = allProjects;
  if (activeFilter !== 'All') list = list.filter(p => p.status === activeFilter);
  if (q) {
    const lq = q.toLowerCase();
    list = list.filter(p =>
      (p.name||'').toLowerCase().includes(lq) ||
      (p.pic||'').toLowerCase().includes(lq) ||
      (p.category||'').toLowerCase().includes(lq)
    );
  }
  renderTable(list);
}

function renderTable(projects) {
  const tbody = $('projectTable');
  tbody.innerHTML = '';
  $('noProjects').style.display = projects.length ? 'none' : 'block';

  projects.forEach((p, i) => {
    const cls = (p.status || '').toLowerCase().replace(/\s+/g, '-');
    const pri = (p.priority || 'medium').toLowerCase();
    const pct = p.progress !== undefined ? p.progress : null;
    const due = p.dueDate ? new Date(p.dueDate).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }) : '—';
    const overdue = p.dueDate && new Date(p.dueDate) < new Date() && p.status !== 'Completed' && p.status !== 'Cancelled';

    tbody.innerHTML += `
      <tr>
        <td style="color:var(--muted);font-size:.8rem">${i + 1}</td>
        <td style="font-weight:600">${fmt(p.name)}</td>
        <td><span class="pt-status ${cls}">${fmt(p.status)}</span></td>
        <td><span class="priority-dot ${pri}">${fmt(p.priority)}</span></td>
        <td>${fmt(p.pic)}</td>
        <td style="color:${overdue ? 'var(--danger)' : 'inherit'};font-weight:${overdue?'600':'400'}">${due}${overdue?' ⚠':'  '}</td>
        <td>
          ${pct !== null ? `
          <div style="display:flex;align-items:center;gap:8px">
            <div class="mini-progress"><div class="mini-progress-fill" style="width:${pct}%"></div></div>
            <span style="font-size:.78rem;color:var(--muted)">${pct}%</span>
          </div>` : '—'}
        </td>
        <td style="color:var(--muted);font-size:.83rem">${fmt(p.category)}</td>
      </tr>`;
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  // Fetch all data in parallel
  const [homeData, kpiData, trackerData] = await Promise.allSettled([
    fetchJSON(DATA_SOURCES.home),
    fetchJSON(DATA_SOURCES.kpis),
    fetchJSON(DATA_SOURCES.projects),
  ]);

  if (homeData.status === 'fulfilled')    renderHome(homeData.value);
  else { $('homeLoading').innerHTML = '⚠ Could not load Home ID data.'; }

  if (kpiData.status === 'fulfilled')     renderKPIs(kpiData.value);
  else { $('kpiLoading').innerHTML = '⚠ Could not load KPI data.'; }

  if (trackerData.status === 'fulfilled') renderTracker(trackerData.value);
  else { $('trackerLoading').innerHTML = '⚠ Could not load project data.'; }
}

init();
</script>
</body>
</html>
