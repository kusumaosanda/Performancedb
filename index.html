<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1e3a5f;
      --accent: #2d7dd2;
      --accent2: #3ec6a6;
      --danger: #e74c3c;
      --warning: #f39c12;
      --success: #27ae60;
      --bg: #f0f2f6;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --sidebar-w: 220px;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ─────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--primary);
      color: #fff;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 100;
      transition: transform .3s;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .sidebar-logo h2 { font-size: 1.1rem; font-weight: 700; letter-spacing: .5px; }
    .sidebar-logo p  { font-size: .72rem; color: rgba(255,255,255,.55); margin-top: 2px; }

    nav { flex: 1; padding: 16px 0; }
    nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 20px;
      color: rgba(255,255,255,.7);
      text-decoration: none;
      font-size: .88rem;
      border-left: 3px solid transparent;
      transition: all .2s;
      cursor: pointer;
    }
    nav a:hover, nav a.active {
      color: #fff;
      background: rgba(255,255,255,.08);
      border-left-color: var(--accent2);
    }
    nav a .icon { font-size: 1.1rem; width: 20px; text-align: center; }

    .sidebar-footer {
      padding: 16px 20px;
      font-size: .72rem;
      color: rgba(255,255,255,.35);
      border-top: 1px solid rgba(255,255,255,.1);
    }

    /* ── MAIN ────────────────────────────────────── */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0;
      z-index: 50;
    }
    header h1 { font-size: 1rem; font-weight: 600; color: var(--text); }
    .header-meta { font-size: .8rem; color: var(--muted); }
    .header-badge {
      background: var(--accent2);
      color: #fff;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 600;
    }

    .hamburger {
      display: none;
      background: none; border: none;
      font-size: 1.4rem; cursor: pointer;
      color: var(--text);
    }

    /* ── CONTENT ─────────────────────────────────── */
    .content { padding: 28px; flex: 1; }

    .page { display: none; }
    .page.active { display: block; }

    /* ── CARDS ───────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      padding: 22px 24px;
    }
    .card-title {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── GRID ────────────────────────────────────── */
    .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; }

    /* ── HOME ID ─────────────────────────────────── */
    .home-id-header {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 20px;
    }
    .home-id-avatar {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: #fff; flex-shrink: 0;
    }
    .home-id-title h2 { font-size: 1.3rem; font-weight: 700; }
    .home-id-title p  { font-size: .85rem; color: var(--muted); margin-top: 4px; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
      gap: 14px;
    }
    .info-item label {
      display: block;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .info-item span {
      font-size: .9rem;
      font-weight: 500;
    }

    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 600;
    }
    .status-badge.active   { background: #d1fae5; color: #065f46; }
    .status-badge.on-hold  { background: #fef3c7; color: #92400e; }
    .status-badge.complete { background: #dbeafe; color: #1e40af; }
    .status-badge.inactive { background: #f3f4f6; color: #6b7280; }
    .status-badge::before { content: '●'; }

    .tag {
      display: inline-block;
      background: #eff6ff;
      color: var(--accent);
      border: 1px solid #bfdbfe;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: .75rem;
      font-weight: 500;
      margin: 2px;
    }

    /* ── KPI CARDS ───────────────────────────────── */
    .kpi-card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      border-top: 4px solid var(--accent);
      position: relative;
      overflow: hidden;
    }
    .kpi-card .icon-bg {
      position: absolute;
      right: 16px; top: 16px;
      font-size: 2rem;
      opacity: .1;
    }
    .kpi-label {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
    }
    .kpi-value {
      font-size: 2rem;
      font-weight: 800;
      margin: 6px 0 4px;
      color: var(--text);
    }
    .kpi-meta { font-size: .78rem; color: var(--muted); }
    .kpi-progress { margin-top: 12px; }
    .kpi-progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .kpi-progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .6s ease;
    }
    .kpi-progress-label {
      display: flex; justify-content: space-between;
      font-size: .72rem; color: var(--muted); margin-top: 5px;
    }
    .delta {
      font-size: .78rem; font-weight: 600;
      padding: 2px 7px; border-radius: 99px;
      margin-left: 6px;
    }
    .delta.up   { background: #d1fae5; color: #065f46; }
    .delta.down { background: #fee2e2; color: #991b1b; }
    .delta.flat { background: #f3f4f6; color: #6b7280; }

    .chart-wrap { position: relative; height: 200px; margin-top: 8px; }

    /* ── PROJECT TRACKER ─────────────────────────── */
    .pt-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
    }
    .pt-toolbar h2 { font-size: 1.05rem; font-weight: 700; }
    .pt-filter-group { display: flex; gap: 8px; flex-wrap: wrap; }

    .filter-btn {
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: var(--card);
      font-size: .78rem;
      cursor: pointer;
      transition: all .2s;
      color: var(--muted);
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .search-input {
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .85rem;
      outline: none;
      width: 200px;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent); }

    .pt-table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: .73rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: #f8fafc; }
    tbody td { padding: 12px 14px; font-size: .88rem; }

    .pt-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .74rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .pt-status.not-started  { background: #f3f4f6; color: #6b7280; }
    .pt-status.in-progress  { background: #dbeafe; color: #1e40af; }
    .pt-status.completed    { background: #d1fae5; color: #065f46; }
    .pt-status.on-hold      { background: #fef3c7; color: #92400e; }
    .pt-status.cancelled    { background: #fee2e2; color: #991b1b; }
    .pt-status::before      { content: '●'; }

    .priority-dot {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .83rem; font-weight: 500;
    }
    .priority-dot::before { content: '●'; font-size: .65rem; }
    .priority-dot.high   { color: #e74c3c; }
    .priority-dot.medium { color: #f39c12; }
    .priority-dot.low    { color: #27ae60; }

    .mini-progress {
      width: 80px; height: 6px;
      background: var(--border);
      border-radius: 99px; overflow: hidden;
    }
    .mini-progress-fill {
      height: 100%; border-radius: 99px;
      background: var(--accent);
    }

    .pt-stats {
      display: flex; gap: 20px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .pt-stat {
      background: var(--card);
      border-radius: 10px;
      padding: 14px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      flex: 1; min-width: 100px;
      text-align: center;
    }
    .pt-stat .num { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
    .pt-stat .lbl { font-size: .72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

    .empty-state {
      text-align: center; padding: 40px; color: var(--muted);
      font-size: .88rem;
    }

    /* ── SECTION SPACER ──────────────────────────── */
    .section-gap { margin-top: 24px; }

    /* ── LOADING ─────────────────────────────────── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; color: var(--muted); font-size: .9rem; gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ──────────────────────────────── */
    @media (max-width: 768px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #main { margin-left: 0; }
      .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr 1fr; }
      .hamburger { display: block; }
      .content { padding: 16px; }
    }
    @media (max-width: 480px) {
      .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
    }

    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 90;
    }
    #overlay.show { display: block; }

    /* ── ENTITY TABS ─────────────────────────────── */
    .period-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
    }
    .period-label {
      font-size: 1rem; font-weight: 700; color: var(--text);
    }
    .period-meta { font-size: .78rem; color: var(--muted); }

    .entity-tabs {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .entity-tab {
      padding: 7px 18px;
      border-radius: 99px;
      border: 2px solid var(--border);
      background: var(--card);
      font-size: .82rem; font-weight: 600;
      cursor: pointer; color: var(--muted);
      transition: all .2s;
    }
    .entity-tab:hover { border-color: var(--accent); color: var(--accent); }
    .entity-tab.active {
      background: var(--accent); border-color: var(--accent);
      color: #fff;
    }

    /* ── SLA SUMMARY CARDS ───────────────────────── */
    .sla-card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      border-left: 5px solid var(--accent);
    }
    .sla-card .lbl {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .7px; color: var(--muted); margin-bottom: 6px;
    }
    .sla-card .val {
      font-size: 1.9rem; font-weight: 800; color: var(--text); line-height: 1;
    }
    .sla-card .sub { font-size: .78rem; color: var(--muted); margin-top: 5px; }

    /* Big SLA % ring */
    .sla-ring-card {
      background: var(--card);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      display: flex; align-items: center; gap: 24px;
    }
    .sla-ring { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
    .sla-ring canvas { width: 110px !important; height: 110px !important; }
    .sla-ring-pct {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 800; color: var(--text);
    }
    .sla-ring-info h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
    .sla-ring-info p  { font-size: .82rem; color: var(--muted); line-height: 1.6; }

    /* Entity grid (ALL view) */
    .entity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .entity-summary-card {
      background: var(--card);
      border-radius: 10px;
      padding: 16px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      border-top: 3px solid var(--accent);
      cursor: pointer;
      transition: box-shadow .2s, transform .15s;
    }
    .entity-summary-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      transform: translateY(-2px);
    }
    .entity-summary-card .e-name {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .7px; color: var(--muted); margin-bottom: 6px;
    }
    .entity-summary-card .e-pct {
      font-size: 1.7rem; font-weight: 800; color: var(--text);
    }
    .entity-summary-card .e-sub {
      font-size: .75rem; color: var(--muted); margin-top: 4px;
    }
    .e-bar {
      height: 4px; background: var(--border); border-radius: 99px;
      margin-top: 10px; overflow: hidden;
    }
    .e-bar-fill {
      height: 100%; border-radius: 99px; background: var(--accent);
    }

    @media (max-width: 768px) {
      .entity-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-logo">
    <h2 id="sidebarTitle">My Dashboard</h2>
    <p id="sidebarSub">Management Portal</p>
  </div>
  <nav>
    <a class="active" onclick="showPage('home')" id="nav-home">
      <span class="icon">🏠</span> Home ID
    </a>
    <a onclick="showPage('kpi')" id="nav-kpi">
      <span class="icon">📊</span> KPI Menu
    </a>
    <a onclick="showPage('tracker')" id="nav-tracker">
      <span class="icon">📋</span> Project Tracker
    </a>
  </nav>
  <div class="sidebar-footer" id="lastUpdated">Loading…</div>
</div>
<div id="overlay" onclick="closeSidebar()"></div>

<!-- Main -->
<div id="main">
  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <h1 id="pageTitle">Home ID</h1>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="header-meta" id="headerDate"></span>
      <span class="header-badge" id="headerBadge">LIVE</span>
    </div>
  </header>

  <div class="content">

    <!-- ══ HOME ID PAGE ══ -->
    <div class="page active" id="page-home">
      <div class="card">
        <div class="loading" id="homeLoading">
          <div class="spinner"></div> Loading Home ID…
        </div>
        <div id="homeContent" style="display:none">
          <div class="home-id-header">
            <div class="home-id-avatar" id="homeAvatar">🏢</div>
            <div class="home-id-title">
              <h2 id="homeName">—</h2>
              <p id="homeSubtitle">—</p>
            </div>
          </div>
          <div class="info-grid" id="homeInfoGrid"></div>
          <div class="section-gap"></div>
          <div class="card-title">Tags</div>
          <div id="homeTags"></div>
          <div class="section-gap"></div>
          <div class="card-title">Description</div>
          <p id="homeDescription" style="font-size:.9rem;line-height:1.6;color:#374151;"></p>
        </div>
      </div>
    </div>

    <!-- ══ KPI PAGE ══ -->
    <div class="page" id="page-kpi">
      <div class="loading" id="kpiLoading">
        <div class="spinner"></div> Loading KPIs…
      </div>
      <div id="kpiContent" style="display:none">
        <!-- Period + generated time -->
        <div class="period-bar">
          <span class="period-label" id="kpiPeriodLabel">—</span>
          <span class="period-meta" id="kpiGenAt">—</span>
        </div>
        <!-- Entity selector tabs -->
        <div class="entity-tabs" id="entityTabs"></div>
        <!-- Dynamic content area -->
        <div id="kpiBody"></div>
      </div>
    </div>

    <!-- ══ PROJECT TRACKER PAGE ══ -->
    <div class="page" id="page-tracker">
      <div class="loading" id="trackerLoading">
        <div class="spinner"></div> Loading projects…
      </div>
      <div id="trackerContent" style="display:none">
        <div class="pt-stats" id="ptStats"></div>
        <div class="card">
          <div class="pt-toolbar">
            <h2>Projects</h2>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
              <input class="search-input" type="text" placeholder="🔍 Search…" oninput="filterProjects(this.value)" />
              <div class="pt-filter-group" id="statusFilters"></div>
            </div>
          </div>
          <div class="pt-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Project</th>
                  <th>Status</th>
                  <th>Priority</th>
                  <th>PIC</th>
                  <th>Due Date</th>
                  <th>Progress</th>
                  <th>Category</th>
                </tr>
              </thead>
              <tbody id="projectTable"></tbody>
            </table>
            <div class="empty-state" id="noProjects" style="display:none">No projects match your filter.</div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->

<script>
// ─── Data sources ────────────────────────────────────────────────────────────
const DATA = {
  kpis:     './data/kpis.json',
  home:     './data/home.json',
  projects: './data/projects.json',
};

let allProjects  = [];
let activeFilter = 'All';
let chartInstances = {};
let kpiData = null;
let selectedEntity = 'ALL';

const $   = id => document.getElementById(id);
const fmt = v  => (v !== undefined && v !== null && v !== '') ? v : '—';

async function fetchJSON(url) {
  const r = await fetch(url + '?t=' + Date.now());
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
const pageTitles = { home: 'Home ID', kpi: 'KPI Menu', tracker: 'Project Tracker' };

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  $('page-' + id).classList.add('active');
  $('nav-' + id).classList.add('active');
  $('pageTitle').textContent = pageTitles[id];
  closeSidebar();
}
function toggleSidebar() { $('sidebar').classList.toggle('open'); $('overlay').classList.toggle('show'); }
function closeSidebar()   { $('sidebar').classList.remove('open'); $('overlay').classList.remove('show'); }

function setDate() {
  const d = new Date();
  $('headerDate').textContent  = d.toLocaleDateString('en-GB', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
  $('lastUpdated').textContent = 'Updated: ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
setDate();

// ─── HOME ID ─────────────────────────────────────────────────────────────────
function renderHome(data) {
  $('sidebarTitle').textContent    = data.dashboardTitle;
  $('sidebarSub').textContent      = data.dashboardSub;
  $('homeAvatar').textContent      = data.avatar;
  $('homeName').textContent        = data.name;
  $('homeDescription').textContent = data.description;

  let sub = data.subtitle || '';
  if (data.status) {
    const cls = data.status.toLowerCase().replace(/\s+/g,'-');
    sub += ` &nbsp;<span class="status-badge ${cls}">${data.status}</span>`;
  }
  $('homeSubtitle').innerHTML = sub;

  $('homeInfoGrid').innerHTML = (data.fields || []).map(f =>
    `<div class="info-item"><label>${f.label}</label><span>${fmt(f.value)}</span></div>`
  ).join('');

  $('homeTags').innerHTML = (data.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

  $('homeLoading').style.display = 'none';
  $('homeContent').style.display = 'block';
}

// ─── KPI ─────────────────────────────────────────────────────────────────────
const COLORS = ['#2d7dd2','#3ec6a6','#e74c3c','#f39c12','#8b5cf6','#06b6d4','#ec4899','#1e3a5f'];

function slaColor(pct) {
  if (pct >= 95) return '#10b981';
  if (pct >= 90) return '#f59e0b';
  return '#ef4444';
}

function renderKPIs(data) {
  kpiData = data;

  // Period labels
  $('kpiPeriodLabel').textContent = data.period_label || data.period || '—';
  $('kpiGenAt').textContent = data.generated_at
    ? 'Generated: ' + new Date(data.generated_at).toLocaleString('en-GB')
    : '';

  // Build entity tabs: ALL + one per entity
  const tabs = $('entityTabs');
  tabs.innerHTML = '';
  ['ALL', ...(data.entities || []).map(e => e.entity)].forEach(code => {
    const btn = document.createElement('button');
    btn.className = 'entity-tab' + (code === 'ALL' ? ' active' : '');
    btn.textContent = code;
    btn.onclick = () => {
      document.querySelectorAll('.entity-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedEntity = code;
      if (code === 'ALL') renderAllView(data);
      else renderEntityView(data.entities.find(e => e.entity === code));
    };
    tabs.appendChild(btn);
  });

  renderAllView(data);

  $('kpiLoading').style.display = 'none';
  $('kpiContent').style.display = 'block';
}

// ── ALL VIEW: summary cards + entity comparison chart ────────────────────────
function renderAllView(data) {
  selectedEntity = 'ALL';
  const entities = data.entities || [];

  // Totals across all entities
  const totalOrders    = entities.reduce((s,e) => s + e.total, 0);
  const totalComply    = entities.reduce((s,e) => s + e.comply, 0);
  const totalNotComply = entities.reduce((s,e) => s + e.not_comply, 0);
  const totalAnomaly   = entities.reduce((s,e) => s + e.anomaly, 0);
  const overallSla     = totalComply + totalNotComply > 0
    ? (totalComply / (totalComply + totalNotComply) * 100).toFixed(2)
    : '—';
  const slaClr = slaColor(parseFloat(overallSla));

  $('kpiBody').innerHTML = `
    <!-- Summary cards -->
    <div class="grid-4" style="margin-bottom:20px">
      <div class="sla-card" style="border-left-color:${slaClr}">
        <div class="lbl">Overall SLA</div>
        <div class="val" style="color:${slaClr}">${overallSla}%</div>
        <div class="sub">All entities combined</div>
      </div>
      <div class="sla-card" style="border-left-color:var(--accent)">
        <div class="lbl">Total Orders</div>
        <div class="val">${totalOrders.toLocaleString()}</div>
        <div class="sub">Across all entities</div>
      </div>
      <div class="sla-card" style="border-left-color:#10b981">
        <div class="lbl">Comply</div>
        <div class="val" style="color:#10b981">${totalComply.toLocaleString()}</div>
        <div class="sub">≤ 72 hours</div>
      </div>
      <div class="sla-card" style="border-left-color:#ef4444">
        <div class="lbl">Not Comply</div>
        <div class="val" style="color:#ef4444">${totalNotComply.toLocaleString()}</div>
        <div class="sub">> 72 hours${totalAnomaly ? ` · ${totalAnomaly} anomaly` : ''}</div>
      </div>
    </div>

    <!-- Entity summary cards (clickable) -->
    <div class="card-title" style="margin-bottom:12px">SLA by Entity — click to drill down</div>
    <div class="entity-grid" id="entityGrid"></div>

    <!-- Charts -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title">SLA % by Entity</div>
        <div class="chart-wrap" style="height:${Math.max(180, entities.length * 44)}px">
          <canvas id="ch_all_bar"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Comply vs Not Comply (All Entities)</div>
        <div class="chart-wrap"><canvas id="ch_all_donut"></canvas></div>
      </div>
    </div>`;

  // Entity summary mini-cards
  const grid = $('entityGrid');
  entities.forEach((e, i) => {
    const clr = slaColor(e.sla_pct);
    grid.innerHTML += `
      <div class="entity-summary-card" style="border-top-color:${clr}"
           onclick="document.querySelectorAll('.entity-tab').forEach(b=>b.classList.remove('active'));
                    document.querySelectorAll('.entity-tab')[${i+1}].classList.add('active');
                    renderEntityView(kpiData.entities[${i}])">
        <div class="e-name">${e.entity}</div>
        <div class="e-pct" style="color:${clr}">${e.sla_pct}%</div>
        <div class="e-sub">${e.comply.toLocaleString()} comply · ${e.not_comply.toLocaleString()} not comply</div>
        <div class="e-bar"><div class="e-bar-fill" style="width:${e.sla_pct}%;background:${clr}"></div></div>
      </div>`;
  });

  setTimeout(() => {
    // Bar chart: SLA % by entity
    const c1 = document.getElementById('ch_all_bar');
    if (c1) {
      if (chartInstances.all_bar) chartInstances.all_bar.destroy();
      chartInstances.all_bar = new Chart(c1, {
        type: 'bar',
        data: {
          labels: entities.map(e => e.entity),
          datasets: [{
            label: 'SLA %',
            data: entities.map(e => e.sla_pct),
            backgroundColor: entities.map(e => slaColor(e.sla_pct) + 'cc'),
            borderColor:     entities.map(e => slaColor(e.sla_pct)),
            borderWidth: 2, borderRadius: 6,
          }]
        },
        options: {
          indexAxis: 'y', responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { min: 80, max: 100, grid: { color: '#f0f2f6' },
                 ticks: { callback: v => v + '%' } },
            y: { grid: { display: false } }
          }
        }
      });
    }

    // Donut: comply vs not comply
    const c2 = document.getElementById('ch_all_donut');
    if (c2) {
      if (chartInstances.all_donut) chartInstances.all_donut.destroy();
      chartInstances.all_donut = new Chart(c2, {
        type: 'doughnut',
        data: {
          labels: ['Comply', 'Not Comply', 'Anomaly'],
          datasets: [{
            data: [totalComply, totalNotComply, totalAnomaly],
            backgroundColor: ['#10b981', '#ef4444', '#9ca3af'],
            borderWidth: 2, borderColor: '#fff'
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '65%',
          plugins: { legend: { position: 'right', labels: { font: { size: 11 }, padding: 14 } } }
        }
      });
    }
  }, 50);
}

// ── ENTITY VIEW: detailed SLA + area breakdown ───────────────────────────────
function renderEntityView(entity) {
  if (!entity) return;
  const clr = slaColor(entity.sla_pct);

  $('kpiBody').innerHTML = `
    <!-- Entity KPI cards -->
    <div class="grid-4" style="margin-bottom:20px">
      <div class="sla-ring-card" style="grid-column: span 2">
        <div class="sla-ring">
          <canvas id="ch_ring"></canvas>
          <div class="sla-ring-pct">${entity.sla_pct}%</div>
        </div>
        <div class="sla-ring-info">
          <h3>${entity.entity} — SLA Compliance</h3>
          <p>
            <b style="color:#10b981">${entity.comply.toLocaleString()}</b> Comply &nbsp;·&nbsp;
            <b style="color:#ef4444">${entity.not_comply.toLocaleString()}</b> Not Comply<br>
            ${entity.anomaly ? `<b style="color:#9ca3af">${entity.anomaly}</b> Anomaly &nbsp;·&nbsp;` : ''}
            Total: <b>${entity.total.toLocaleString()}</b> orders
          </p>
        </div>
      </div>
      <div class="sla-card" style="border-left-color:#10b981">
        <div class="lbl">Comply</div>
        <div class="val" style="color:#10b981">${entity.comply.toLocaleString()}</div>
        <div class="sub">≤ 72 hours TTI</div>
      </div>
      <div class="sla-card" style="border-left-color:#ef4444">
        <div class="lbl">Not Comply</div>
        <div class="val" style="color:#ef4444">${entity.not_comply.toLocaleString()}</div>
        <div class="sub">> 72 hours TTI</div>
      </div>
    </div>

    <!-- Area breakdown charts -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title">SLA % by Area</div>
        <div class="chart-wrap" style="height:${Math.max(180, (entity.by_area||[]).length * 54)}px">
          <canvas id="ch_area_bar"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Comply vs Not Comply by Area</div>
        <div class="chart-wrap"><canvas id="ch_area_stack"></canvas></div>
      </div>
    </div>`;

  setTimeout(() => {
    // Ring gauge
    const ring = document.getElementById('ch_ring');
    if (ring) {
      if (chartInstances.ring) chartInstances.ring.destroy();
      chartInstances.ring = new Chart(ring, {
        type: 'doughnut',
        data: {
          datasets: [{
            data: [entity.sla_pct, 100 - entity.sla_pct],
            backgroundColor: [clr, '#f3f4f6'],
            borderWidth: 0,
          }]
        },
        options: {
          cutout: '78%', responsive: false,
          plugins: { legend: { display: false }, tooltip: { enabled: false } }
        }
      });
    }

    const areas  = (entity.by_area || []).map(a => a.area);
    const slaPcts = (entity.by_area || []).map(a => a.sla_pct);
    const comply  = (entity.by_area || []).map(a => a.comply);
    const notC    = (entity.by_area || []).map(a => a.not_comply);

    // SLA % horizontal bar by area
    const c1 = document.getElementById('ch_area_bar');
    if (c1 && areas.length) {
      if (chartInstances.area_bar) chartInstances.area_bar.destroy();
      chartInstances.area_bar = new Chart(c1, {
        type: 'bar',
        data: {
          labels: areas,
          datasets: [{
            label: 'SLA %',
            data: slaPcts,
            backgroundColor: slaPcts.map(p => slaColor(p) + 'cc'),
            borderColor:     slaPcts.map(p => slaColor(p)),
            borderWidth: 2, borderRadius: 6,
          }]
        },
        options: {
          indexAxis: 'y', responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false },
            tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x}%` } } },
          scales: {
            x: { min: 80, max: 100, ticks: { callback: v => v + '%' }, grid: { color: '#f0f2f6' } },
            y: { grid: { display: false } }
          }
        }
      });
    }

    // Stacked bar: comply vs not comply by area
    const c2 = document.getElementById('ch_area_stack');
    if (c2 && areas.length) {
      if (chartInstances.area_stack) chartInstances.area_stack.destroy();
      chartInstances.area_stack = new Chart(c2, {
        type: 'bar',
        data: {
          labels: areas,
          datasets: [
            { label: 'Comply',     data: comply, backgroundColor: '#10b98199', borderColor: '#10b981', borderWidth:1, borderRadius:4 },
            { label: 'Not Comply', data: notC,   backgroundColor: '#ef444499', borderColor: '#ef4444', borderWidth:1, borderRadius:4 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position:'top', labels:{ font:{size:11} } } },
          scales: {
            x: { stacked: false, grid: { display: false } },
            y: { stacked: false, beginAtZero: true, grid: { color: '#f0f2f6' },
                 ticks: { callback: v => v.toLocaleString() } }
          }
        }
      });
    }
  }, 50);
}

// ─── PROJECT TRACKER ─────────────────────────────────────────────────────────
function renderTracker(data) {
  allProjects = data.projects || [];
  const statuses = ['Not Started','In Progress','Completed','On Hold','Cancelled'];

  const projects = allProjects;
  // Summary stats
  const statsEl = $('ptStats');
  const counts  = {};
  statuses.forEach(s => { counts[s] = projects.filter(p => p.status === s).length; });
  statsEl.innerHTML = [
    { k:'Total',        v: projects.length },
    { k:'In Progress',  v: counts['In Progress'] },
    { k:'Completed',    v: counts['Completed']   },
    { k:'On Hold',      v: counts['On Hold']     },
  ].map(({ k, v }) =>
    `<div class="pt-stat"><div class="num">${v||0}</div><div class="lbl">${k}</div></div>`
  ).join('');

  // Filter buttons
  $('statusFilters').innerHTML = ['All',...statuses].map(s =>
    `<button class="filter-btn ${s==='All'?'active':''}" onclick="setFilter('${s}',this)">${s}</button>`
  ).join('');

  renderTable(projects);

  $('trackerLoading').style.display = 'none';
  $('trackerContent').style.display = 'block';
}

function setFilter(status, btn) {
  activeFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter((document.querySelector('.search-input')||{}).value || '');
}
function filterProjects(q) { applyFilter(q); }
function applyFilter(q) {
  let list = allProjects;
  if (activeFilter !== 'All') list = list.filter(p => p.status === activeFilter);
  if (q) {
    const lq = q.toLowerCase();
    list = list.filter(p =>
      (p.name||'').toLowerCase().includes(lq) ||
      (p.pic||'').toLowerCase().includes(lq)  ||
      (p.category||'').toLowerCase().includes(lq)
    );
  }
  renderTable(list);
}

function renderTable(projects) {
  const tbody = $('projectTable');
  tbody.innerHTML = '';
  $('noProjects').style.display = projects.length ? 'none' : 'block';

  projects.forEach((p, i) => {
    const cls = (p.status || '').toLowerCase().replace(/\s+/g,'-');
    const pri = (p.priority || 'medium').toLowerCase();
    const pct = p.progress !== null ? p.progress : null;
    let dueDisplay = '—', overdue = false;
    if (p.dueDate) {
      const d = new Date(p.dueDate);
      if (!isNaN(d)) {
        dueDisplay = d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
        overdue = d < new Date() && p.status !== 'Completed' && p.status !== 'Cancelled';
      } else { dueDisplay = p.dueDate; }
    }

    tbody.innerHTML += `
      <tr>
        <td style="color:var(--muted);font-size:.8rem">${i+1}</td>
        <td style="font-weight:600">${fmt(p.name)}</td>
        <td><span class="pt-status ${cls}">${fmt(p.status)}</span></td>
        <td><span class="priority-dot ${pri}">${fmt(p.priority)}</span></td>
        <td>${fmt(p.pic)}</td>
        <td style="color:${overdue?'var(--danger)':'inherit'};font-weight:${overdue?600:400}">
          ${dueDisplay}${overdue?' ⚠':''}
        </td>
        <td>${pct !== null ? `
          <div style="display:flex;align-items:center;gap:8px">
            <div class="mini-progress"><div class="mini-progress-fill" style="width:${pct}%"></div></div>
            <span style="font-size:.78rem;color:var(--muted)">${pct}%</span>
          </div>` : '—'}
        </td>
        <td style="color:var(--muted);font-size:.83rem">${fmt(p.category)}</td>
      </tr>`;
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function showErr(elId, msg) {
  $(elId).innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">⚠ ${msg}</div>`;
}

async function init() {
  const [homeRes, kpiRes, projRes] = await Promise.allSettled([
    fetchJSON(DATA.home),
    fetchJSON(DATA.kpis),
    fetchJSON(DATA.projects),
  ]);

  if (homeRes.status === 'fulfilled') renderHome(homeRes.value);
  else showErr('homeLoading', `Could not load home data: ${homeRes.reason?.message}`);

  if (kpiRes.status === 'fulfilled') renderKPIs(kpiRes.value);
  else showErr('kpiLoading', `Could not load KPI data: ${kpiRes.reason?.message}`);

  if (projRes.status === 'fulfilled') renderTracker(projRes.value);
  else showErr('trackerLoading', `Could not load project data: ${projRes.reason?.message}`);
}

init();
</script>
</body>
</html>
